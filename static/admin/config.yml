local_backend: true

backend:
  name: git-gateway
  repo: rotor-data/recipe-musikproduktion
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

publish_mode: editorial_workflow
media_folder: static/img
public_folder: /img

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "src/pages/index.md"
        label: "Start Page"
        name: "index"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - {
              label: "Meta",
              name: "meta",
              widget: "object",
              hint: "SEO fields used in Google and social shares.",
              fields: [
                { label: "SEO title", name: "title", widget: "string", hint: "Keep this clear and keyword-focused (about 50-60 characters)." },
                { label: "SEO description", name: "description", widget: "text", hint: "Short summary for search/social (about 140-160 characters)." }
              ]
            }
          - {
              label: "Hero",
              name: "hero",
              widget: "object",
              hint: "Top section of the start page.",
              fields: [
                { label: "Main headline", name: "title", widget: "string", hint: "Large title shown in the hero." },
                { label: "H1 (SEO line)", name: "h1title", widget: "string", hint: "Small top line used as H1 for SEO." },
                { label: "Intro text (below hero)", name: "description", widget: "text", hint: "Text block shown directly below the hero." },
                {
                  label: "CTA",
                  name: "cta",
                  widget: "object",
                  fields: [
                    { label: "Primary button text", name: "primaryText", widget: "string", required: false },
                    { label: "Primary button link", name: "primaryHref", widget: "string", required: false, hint: "Example: /contact" },
                    { label: "Secondary button text", name: "secondaryText", widget: "string", required: false },
                    { label: "Secondary button link", name: "secondaryHref", widget: "string", required: false, hint: "Example: /work" },
                    { label: "Legacy button text (fallback)", name: "buttonText", widget: "string", required: false }
                  ]
                },
                {
                  label: "Hero image",
                  name: "image",
                  widget: "image",
                  hint: "Best result: wide image, high quality.",
                  required: false
                }
              ]
            }
          - {
              label: "Logo banner",
              name: "logoBanner",
              widget: "object",
              required: false,
              hint: "Partner logos shown below the hero. If empty, built-in logo gallery files are used.",
              fields: [
                { label: "Label", name: "label", widget: "string", required: false, hint: "Small uppercase label before the logos." },
                {
                  label: "Logos",
                  name: "logos",
                  widget: "list",
                  required: false,
                  summary: "{{fields.alt}}",
                  fields: [
                    { label: "Logo image", name: "image", widget: "image" },
                    { label: "Alt text", name: "alt", widget: "string", required: false },
                    { label: "External link", name: "href", widget: "string", required: false, hint: "Optional URL if logo should be clickable." }
                  ]
                }
              ]
            }
          - {
              label: "Page Sections",
              name: "pageCopy",
              widget: "object",
              fields: [
                {
                  label: "Content blocks",
                  name: "flowBlocks",
                  widget: "list",
                  summary: "{{fields.highlight.title}} ({{fields.highlightPosition}})",
                  hint: "Blocks are rendered in order: Services, Work, People.",
                  fields: [
                    {
                      label: "Highlight position",
                      name: "highlightPosition",
                      widget: "select",
                      options: ["left", "right"],
                      default: "right"
                    },
                    {
                      label: "Highlight",
                      name: "highlight",
                      widget: "object",
                      hint: "Main text for this block.",
                      fields: [
                        { label: "Pretitle", name: "pretitle", widget: "string", required: false, hint: "Small uppercase label above the title." },
                        { label: "Title", name: "title", widget: "string", required: false, hint: "Main heading for this block." },
                        { label: "Body", name: "body", widget: "text", required: false, hint: "Optional short paragraph." },
                        { label: "CTA text", name: "ctaText", widget: "string", required: false, hint: "Optional button/link text." },
                        { label: "CTA link", name: "ctaLink", widget: "string", required: false, hint: "Use a relative path, e.g. /work." },
                        { label: "Secondary CTA text", name: "secondaryCtaText", widget: "string", required: false, hint: "Used on sections that show a second button." },
                        { label: "Secondary CTA link", name: "secondaryCtaLink", widget: "string", required: false, hint: "Use a relative path, e.g. /contact." },
                        { label: "Mega headline", name: "megaHeadline", widget: "string", required: false }
                      ]
                    },
                    { label: "Show gallery", name: "showGallery", widget: "boolean", default: false, hint: "Use only when this block should include gallery cards." },
                    {
                      label: "Gallery items",
                      name: "galleryItems",
                      widget: "list",
                      summary: "{{fields.title}}",
                      hint: "Used for visual teaser cards.",
                      fields: [
                        {
                          label: "Image",
                          name: "image",
                          widget: "image"
                        },
                        {
                          label: "Crop position",
                          name: "cropPosition",
                          widget: "select",
                          required: false,
                          options: ["top", "center", "bottom"],
                          default: "center",
                          hint: "Controls vertical crop focus."
                        },
                        { label: "Title", name: "title", widget: "string", required: false },
                        { label: "Subtitle", name: "subtitle", widget: "string", required: false },
                        { label: "Big text", name: "bigText", widget: "string", required: false },
                        { label: "Link", name: "link", widget: "string", required: false }
                      ]
                    },
                    {
                      label: "Cards",
                      name: "cards",
                      widget: "list",
                      summary: "{{fields.title}}",
                      hint: "Use for supporting cards in each section.",
                      fields: [
                        { label: "Tagline", name: "tagline", widget: "string", required: false },
                        { label: "Title", name: "title", widget: "string", required: false },
                        { label: "Description", name: "description", widget: "text", required: false },
                        { label: "Full width", name: "fullWidth", widget: "boolean", default: false },
                        { label: "Link", name: "link", widget: "string", required: false },
                        { label: "Link label", name: "linkLabel", widget: "string", required: false },
                        {
                          label: "Image",
                          name: "image",
                          widget: "image"
                        },
                        {
                          label: "Crop position",
                          name: "cropPosition",
                          widget: "select",
                          required: false,
                          options: ["top", "center", "bottom"],
                          default: "center",
                          hint: "Controls vertical crop focus."
                        },
                      ]
                    }
                  ]
                },
                {
                  label: "Bottom CTA",
                  name: "bottomCta",
                  widget: "object",
                  required: false,
                  fields: [
                    { label: "Title", name: "title", widget: "string", required: false },
                    { label: "Button text", name: "buttonText", widget: "string", required: false },
                    { label: "Button link", name: "buttonHref", widget: "string", required: false, hint: "Example: /contact" }
                  ]
                }
              ]
            }
      - file: "src/pages/people/index.md"
        label: "People Gallery Page"
        name: "people"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "people-gallery",
            }
          - {
              label: "Meta",
              name: "meta",
              widget: "object",
              fields: [
                { label: "SEO title", name: "title", widget: "string", required: false },
                { label: "SEO description", name: "description", widget: "text", required: false }
              ]
            }
          - {
              label: "Hero",
              name: "hero",
              widget: "object",
              fields: [
                { label: "Kicker", name: "kicker", widget: "string", required: false },
                { label: "Page title", name: "pageTitle", widget: "string", required: false },
                { label: "Lead text", name: "lead", widget: "text", required: false }
              ]
            }
          - {
              label: "CTA",
              name: "cta",
              widget: "object",
              fields: [
                { label: "Title", name: "title", widget: "string", required: false },
                { label: "Link text", name: "linkText", widget: "string", required: false },
                { label: "Link href", name: "linkHref", widget: "string", required: false }
              ]
            }
          - {
              label: "Featured images (1-5)",
              name: "featuredImages",
              widget: "list",
              required: false,
              min: 5,
              max: 5,
              summary: "#{{fields.order}} - {{fields.title}}",
              hint: "Five fronted images used in people preview/home strip.",
              fields: [
                { label: "Order", name: "order", widget: "select", options: [1, 2, 3, 4, 5], default: 1 },
                { label: "Title", name: "title", widget: "string", required: false },
                { label: "Subtitle", name: "subtitle", widget: "string", required: false },
                { label: "Alt text", name: "alt", widget: "string", required: false, hint: "Describe the image for accessibility." },
                {
                  label: "Image",
                  name: "src",
                  widget: "image"
                },
                {
                  label: "Crop position",
                  name: "cropPosition",
                  widget: "select",
                  required: false,
                  options: ["top", "center", "bottom"],
                  default: "center",
                  hint: "Controls vertical crop focus."
                }
              ]
            }
          - {
              label: "Gallery images",
              name: "galleryImages",
              widget: "list",
              summary: "{{fields.title}}",
              hint: "Single image list for the gallery. Upload all images here.",
              fields: [
                { label: "Title (shown in lightbox)", name: "title", widget: "string", required: false },
                { label: "Subtitle", name: "subtitle", widget: "string", required: false },
                { label: "Alt text", name: "alt", widget: "string", required: false, hint: "Describe the image for accessibility." },
                {
                  label: "Image",
                  name: "src",
                  widget: "image"
                },
                {
                  label: "Crop position",
                  name: "cropPosition",
                  widget: "select",
                  required: false,
                  options: ["top", "center", "bottom"],
                  default: "center",
                  hint: "Controls vertical crop focus."
                },
              ]
            }
      - file: "src/pages/work-content.md"
        label: "Work Page"
        name: "work"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "work-page",
            }
          - {
              label: "Visible",
              name: "visible",
              widget: "hidden",
              default: false
            }
          - {
              label: "Meta",
              name: "meta",
              widget: "object",
              fields: [
                { label: "SEO title", name: "title", widget: "string", required: false },
                { label: "SEO description", name: "description", widget: "text", required: false }
              ]
            }
          - {
              label: "Hero",
              name: "hero",
              widget: "object",
              fields: [
                { label: "Eyebrow", name: "eyebrow", widget: "string", required: false },
                { label: "Title", name: "title", widget: "string", required: false },
                { label: "Status label", name: "statusLabel", widget: "string", required: false },
                { label: "Status value", name: "statusValue", widget: "string", required: false }
              ]
            }
          - {
              label: "Featured videos (1-5)",
              name: "featuredVideos",
              widget: "list",
              min: 5,
              max: 5,
              summary: "#{{fields.order}} - {{fields.title}}",
              hint: "Use direct YouTube URLs (e.g. youtu.be links).",
              fields: [
                { label: "Order", name: "order", widget: "select", options: [1, 2, 3, 4, 5], default: 1 },
                { label: "Title", name: "title", widget: "string" },
                { label: "Subtitle", name: "subtitle", widget: "string", required: false },
                { label: "Category label", name: "category", widget: "string", required: false },
                { label: "Description", name: "description", widget: "text", required: false },
                {
                  label: "YouTube URL",
                  name: "youtubeUrl",
                  widget: "string",
                  hint: "Example: https://youtu.be/S6D9-7q0-b4"
                },
                {
                  label: "Thumbnail image (optional)",
                  name: "thumbnail",
                  widget: "image",
                  required: false,
                  hint: "Leave empty to auto-use YouTube thumbnail."
                },
                {
                  label: "Crop position",
                  name: "cropPosition",
                  widget: "select",
                  required: false,
                  options: ["top", "center", "bottom"],
                  default: "center",
                  hint: "Controls vertical crop focus."
                }
              ]
            }
      - file: "src/pages/contact.md"
        label: "Contact Page"
        name: "contact"
        fields:
          - {
              label: "Meta",
              name: "meta",
              widget: "object",
              hint: "SEO fields for the contact page.",
              fields: [
                { label: "SEO title", name: "title", widget: "string" },
                { label: "SEO description", name: "description", widget: "text" }
              ]
            }
          - {
              label: "Contact content",
              name: "contact",
              widget: "object",
              hint: "Main contact panel and map content.",
              fields: [
                { label: "Page title", name: "pageTitle", widget: "string", hint: "Main heading on the page." },
                { label: "Panel tag", name: "panelTag", widget: "string", required: false },
                { label: "Details panel title", name: "detailsTitle", widget: "string", hint: "Heading above address/contact details." },
                { label: "Operator label", name: "operatorLabel", widget: "string", required: false },
                { label: "Operator name", name: "operatorName", widget: "string", required: false },
                { label: "Operator role", name: "operatorRole", widget: "string", required: false },
                { label: "Address label", name: "addressLabel", widget: "string", required: false },
                {
                  label: "Details lines",
                  name: "lines",
                  widget: "list",
                  hint: "Each line appears as one row in the details panel.",
                  field: { label: "Line", name: "line", widget: "string" }
                },
                { label: "Email label", name: "emailLabel", widget: "string", hint: "Example: Frequency link" },
                { label: "Email address", name: "email", widget: "string", hint: "Used for mailto link." },
                { label: "Email meta text", name: "emailMeta", widget: "string", required: false },
                { label: "Map panel title", name: "locationTitle", widget: "string", hint: "Example: Location" },
                { label: "Map badge", name: "locationBadge", widget: "string", required: false },
                { label: "Map coordinates", name: "mapCoordinates", widget: "string", required: false },
                { label: "Map sector text", name: "mapSector", widget: "string", required: false },
                { label: "Map embed URL", name: "mapEmbedUrl", widget: "string", hint: "Google Maps embed URL." },
                { label: "Status label", name: "statusLabel", widget: "string", required: false },
                { label: "Status value", name: "statusValue", widget: "string", required: false },
                {
                  label: "Action cards",
                  name: "actions",
                  widget: "list",
                  summary: "{{fields.title}}",
                  required: false,
                  fields: [
                    { label: "Label", name: "label", widget: "string", required: false },
                    { label: "Title", name: "title", widget: "string", required: false },
                    { label: "Link", name: "href", widget: "string", required: false }
                  ]
                }
              ]
            }
