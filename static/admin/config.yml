local_backend: true

backend:
  name: git-gateway
  repo: rotor-data/recipe-musikproduktion
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

publish_mode: editorial_workflow
media_folder: static/img
public_folder: /img

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "src/pages/index.md"
        label: "Start Page"
        name: "index"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "index-page",
            }
          - {
              label: "Meta",
              name: "meta",
              widget: "object",
              hint: "SEO fields used in Google and social shares.",
              fields: [
                { label: "SEO title", name: "title", widget: "string", hint: "Keep this clear and keyword-focused (about 50-60 characters)." },
                { label: "SEO description", name: "description", widget: "text", hint: "Short summary for search/social (about 140-160 characters)." }
              ]
            }
          - {
              label: "Hero",
              name: "hero",
              widget: "object",
              hint: "Top section of the start page.",
              fields: [
                { label: "Main headline", name: "title", widget: "string", hint: "Large title shown in the hero." },
                { label: "H1 (SEO line)", name: "h1title", widget: "string", hint: "Small top line used as H1 for SEO." },
                { label: "Intro text (below hero)", name: "description", widget: "text", hint: "Text block shown directly below the hero." },
                {
                  label: "CTA",
                  name: "cta",
                  widget: "object",
                  fields: [
                    { label: "Button text", name: "buttonText", widget: "string", required: false }
                  ]
                },
                {
                  label: "Hero image",
                  name: "image",
                  widget: "image",
                  hint: "Best result: wide image, high quality.",
                  required: false
                }
              ]
            }
          - {
              label: "Page Sections",
              name: "pageCopy",
              widget: "object",
              fields: [
                {
                  label: "Content blocks",
                  name: "flowBlocks",
                  widget: "list",
                  summary: "{{fields.highlight.title}} ({{fields.highlightPosition}})",
                  hint: "Blocks are rendered in order: Services, Work, People.",
                  fields: [
                    {
                      label: "Highlight position",
                      name: "highlightPosition",
                      widget: "select",
                      options: ["left", "right"],
                      default: "right"
                    },
                    {
                      label: "Highlight",
                      name: "highlight",
                      widget: "object",
                      hint: "Main text for this block.",
                      fields: [
                        { label: "Pretitle", name: "pretitle", widget: "string", required: false, hint: "Small uppercase label above the title." },
                        { label: "Title", name: "title", widget: "string", required: false, hint: "Main heading for this block." },
                        { label: "Body", name: "body", widget: "text", required: false, hint: "Optional short paragraph." },
                        { label: "CTA text", name: "ctaText", widget: "string", required: false, hint: "Optional button/link text." },
                        { label: "CTA link", name: "ctaLink", widget: "string", required: false, hint: "Use a relative path, e.g. /work." },
                        { label: "Mega headline", name: "megaHeadline", widget: "string", required: false }
                      ]
                    },
                    { label: "Show gallery", name: "showGallery", widget: "boolean", default: false, hint: "Use only when this block should include gallery cards." },
                    {
                      label: "Gallery items",
                      name: "galleryItems",
                      widget: "list",
                      summary: "{{fields.title}}",
                      hint: "Used for visual teaser cards.",
                      fields: [
                        {
                          label: "Image",
                          name: "image",
                          widget: "image"
                        },
                        { label: "Title", name: "title", widget: "string", required: false },
                        { label: "Subtitle", name: "subtitle", widget: "string", required: false },
                        { label: "Big text", name: "bigText", widget: "string", required: false },
                        { label: "Link", name: "link", widget: "string", required: false }
                      ]
                    },
                    {
                      label: "Cards",
                      name: "cards",
                      widget: "list",
                      summary: "{{fields.title}}",
                      hint: "Use for supporting cards in each section.",
                      fields: [
                        { label: "Tagline", name: "tagline", widget: "string", required: false },
                        { label: "Title", name: "title", widget: "string", required: false },
                        { label: "Description", name: "description", widget: "text", required: false },
                        { label: "Full width", name: "fullWidth", widget: "boolean", default: false },
                        { label: "Link", name: "link", widget: "string", required: false },
                        { label: "Link label", name: "linkLabel", widget: "string", required: false },
                        {
                          label: "Image",
                          name: "image",
                          widget: "image"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
      - file: "src/pages/people/index.md"
        label: "People Gallery Page"
        name: "people"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "people-gallery",
            }
          - {
              label: "Gallery blocks",
              name: "galleryBlocks",
              widget: "list",
              summary: "{{fields.highlight.title}}",
              hint: "Each block has one featured image and three gallery cards.",
              fields: [
                {
                  label: "Featured image",
                  name: "highlight",
                  widget: "object",
                  fields: [
                    { label: "Title (name shown in lightbox)", name: "title", widget: "string" },
                    { label: "Body (optional internal note)", name: "body", widget: "text", required: false },
                    { label: "Alt text", name: "alt", widget: "string", required: false, hint: "Describe the image for accessibility." },
                    {
                      label: "Highlight image",
                      name: "src",
                      widget: "image"
                    }
                  ]
                },
                {
                  label: "Gallery cards",
                  name: "cards",
                  widget: "list",
                  summary: "{{fields.title}}",
                  fields: [
                    { label: "Title (name shown in lightbox)", name: "title", widget: "string" },
                    { label: "Alt text", name: "alt", widget: "string", required: false, hint: "Describe the image for accessibility." },
                    {
                      label: "Card image",
                      name: "src",
                      widget: "image"
                    }
                  ]
                }
              ]
            }
